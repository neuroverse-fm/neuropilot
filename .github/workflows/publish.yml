name: Publish Extension

permissions: {}

on:
  workflow_dispatch:
    inputs:
      version:
        type: choice
        description: 'Bump version'
        required: true
        default: 'patch'
        options:
          - 'major'
          - 'minor'
          - 'patch'
          - 'none'

jobs:
  build:
    name: Build VSIX file
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      VERSION: ${{ steps.build.outputs.VERSION }}
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
        persist-credentials: true

    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: ./package.json

    - name: Install deps
      run: pnpm install --frozen-lockfile
      
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    
    - name: Bump version
      if: inputs.version != 'none'
      run: |
        pnpm version ${{ inputs.version }}
    
    - name: Build extension
      id: build
      env:
        NODE_ENV: 1
      run: |
        echo VERSION=$(pnpm show ./ version) >> $GITHUB_OUTPUT
        pnpm vsce package --no-dependencies
    
    - name: Upload VSIX file
      uses: actions/upload-artifact@v7
      with:
        name: NeuroPilot ${{ steps.build.outputs.VERSION }}
        path: neuropilot-base-${{ steps.build.outputs.VERSION }}.vsix

    - name: Commit and push version change
      run: |
        git push --follow-tags https://VSC-NeuroPilot:${{secrets.GITHUB_TOKEN}}:@github.com/VSC-NeuroPilot/neuropilot
    
    - name: Update docs
      env:
        GH_TOKEN: ${{ secrets.DOCUMENTATION_WORKFLOW_TOKEN }}
      run: gh workflow run bump.yml -f version=${{ inputs.version }} -R VSC-NeuroPilot/docs
  
  vsce-publish:
    name: Publish to VS Marketplace
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Visual Studio Marketplace
      url: https://marketplace.visualstudio.com/item?itemName=vsc-neuropilot.neuropilot-base
    steps:
      - name: Checkout repo # why
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download VSIX
        id: vsce-vsix-down
        uses: actions/download-artifact@v8
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ./package.json
      
      - name: Publish VSIX to VS Marketplace
        env:
          VERSION: ${{ needs.build.outputs.VERSION }}
          ARTIFACT_PATH: ${{ steps.vsce-vsix-down.outputs.download-path }}
        run: ls && pnpm dlx @vscode/vsce publish -p ${{ secrets.MARKETPLACE_TOKEN }} --packagePath "${ARTIFACT_PATH}/neuropilot-base-${VERSION}.vsix"
  
  ovsx-publish:
    name: Publish to Open VSX
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Open VSX Registry
      url: https://open-vsx.org/extension/vsc-neuropilot/neuropilot-base
    steps:
      - name: Checkout repo # why
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      
      - name: Download VSIX
        id: ovsx-vsix-down
        uses: actions/download-artifact@v8
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ./package.json
      
      - name: Publish VSIX to Open VSX
        env:
          VERSION: ${{ needs.build.outputs.VERSION }}
          ARTIFACT_PATH: ${{ steps.ovsx-vsix-down.outputs.download-path }}
        run: ls && pnpm dlx ovsx publish -p ${{ secrets.REGISTRY_TOKEN }} --packagePath "${ARTIFACT_PATH}/neuropilot-base-${VERSION}.vsix"
